server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # HTML: immer neu prüfen
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # JS/CSS: ETag-Validierung, kein langes Caching
    location ~* \.(js|css)$ {
        add_header Cache-Control "no-cache, must-revalidate";
        etag on;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
