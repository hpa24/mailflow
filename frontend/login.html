<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mailflow — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f7;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #1c1c1e;
    }
    .login-card {
      background: #ffffff;
      border-radius: 14px;
      padding: 40px;
      width: 360px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    }
    .login-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 6px;
      letter-spacing: -0.5px;
    }
    .login-sub {
      font-size: 15px;
      color: #6c6c70;
      margin-bottom: 28px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #6c6c70;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid #d1d1d6;
      border-radius: 8px;
      font-size: 16px;
      margin-bottom: 16px;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #0a84ff; }
    .btn-login {
      width: 100%;
      padding: 12px;
      background: #0a84ff;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
    }
    .btn-login:hover { opacity: 0.88; }
    .btn-login:disabled { opacity: 0.5; cursor: default; }
    .error-msg {
      color: #ff3b30;
      font-size: 14px;
      margin-top: 12px;
      text-align: center;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-title">Mailflow</div>
    <div class="login-sub">Bitte melde dich an</div>
    <form id="login-form">
      <label for="email">E-Mail</label>
      <input type="email" id="email" placeholder="deine@email.de" required autofocus>
      <label for="password">Passwort</label>
      <input type="password" id="password" placeholder="••••••••" required>
      <button class="btn-login" id="btn-login" type="submit">Anmelden</button>
      <div class="error-msg" id="error-msg"></div>
    </form>
  </div>

  <script src="js/auth.js"></script>
  <script>
    // Schon eingeloggt? Direkt weiterleiten
    if (auth.isLoggedIn()) window.location.href = '/';

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn-login');
      const errEl = document.getElementById('error-msg');
      btn.disabled = true;
      btn.textContent = 'Anmelden…';
      errEl.textContent = '';
      try {
        await auth.login(
          document.getElementById('email').value,
          document.getElementById('password').value
        );
        window.location.href = '/';
      } catch (err) {
        errEl.textContent = 'E-Mail oder Passwort falsch.';
        btn.disabled = false;
        btn.textContent = 'Anmelden';
      }
    });
  </script>
</body>
</html>
