services:
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    volumes:
      - pb_data:/pb/pb_data
      - ./pocketbase/pb_migrations:/pb/pb_migrations
    ports:
      - "8090:8090"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8090/api/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  backend:
    build: ./backend
    environment:
      - PB_URL=http://pocketbase:8090
      - PB_ADMIN_EMAIL=${PB_ADMIN_EMAIL}
      - PB_ADMIN_PASSWORD=${PB_ADMIN_PASSWORD}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - PB_DATA_PATH=/pb/pb_data/data.db
    volumes:
      - pb_data:/pb/pb_data
      - ./backend:/app
    depends_on:
      pocketbase:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
    environment:
      - MAILFLOW_API_KEY=${MAILFLOW_API_KEY}
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  pb_data:
